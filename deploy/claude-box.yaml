apiVersion: v1
kind: Namespace
metadata:
  name: claude-box
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude-box
  namespace: claude-box
spec:
  replicas: 3
  serviceName: claude-box
  selector:
    matchLabels:
      app: claude-box
  template:
    metadata:
      labels:
        app: claude-box
    spec:
      containers:
      - name: claude
        image: quay.io/apanatto/claude-box:latest
        imagePullPolicy: Always
        stdin: true
        tty: true
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/gcp/application_default_credentials.json
        envFrom:
        - secretRef:
            name: claude-box-secrets
        workingDir: /workspace
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: gcp-credentials
          mountPath: /var/secrets/gcp
          readOnly: true
      volumes:
      - name: gcp-credentials
        secret:
          secretName: claude-box-secrets
          optional: true
          items:
          - key: application_default_credentials.json
            path: application_default_credentials.json
  volumeClaimTemplates:
  - metadata:
      name: workspace
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
