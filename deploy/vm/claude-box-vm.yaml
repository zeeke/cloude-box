apiVersion: v1
kind: Namespace
metadata:
  name: claude-box-vm
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: claude-box-vm-0
  namespace: claude-box-vm
  labels:
    app: claude-box-vm
spec:
  running: true
  template:
    metadata:
      labels:
        app: claude-box-vm
    spec:
      domain:
        cpu:
          cores: 4
        resources:
          requests:
            memory: 8Gi
        devices:
          disks:
          - name: rootdisk
            disk:
              bus: virtio
          - name: workspace
            disk:
              bus: virtio
          - name: cloudinit
            disk:
              bus: virtio
          - name: secrets
            disk:
              bus: virtio
              serial: SECRETS
      volumes:
      - name: rootdisk
        containerDisk:
          image: quay.io/containerdisks/fedora:latest
      - name: workspace
        persistentVolumeClaim:
          claimName: claude-box-vm-0-workspace
      - name: cloudinit
        cloudInitNoCloud:
          userData: |
            #cloud-config
            user: claude
            password: claude
            chpasswd:
              expire: false
            ssh_pwauth: true
            packages:
            - curl
            - git
            - ca-certificates
            - ripgrep
            - gh
            - golang
            - tmux
            - procps-ng
            - iproute
            - net-tools
            - bind-utils
            runcmd:
            - mkdir -p /mnt/workspace && mount /dev/vdb /mnt/workspace || true
            - chown claude:claude /mnt/workspace
            - ln -sf /mnt/workspace /home/claude/workspace
            - mkdir -p /mnt/secrets && mount /dev/disk/by-id/virtio-SECRETS /mnt/secrets || true
            - |
              cat > /etc/profile.d/claude-box.sh << 'PROFILE'
              for f in /mnt/secrets/*; do
                [ -f "$f" ] && export "$(basename "$f")"="$(cat "$f")"
              done
              export PATH="$HOME/.local/bin:$PATH"
              PROFILE
            - su - claude -c 'curl -fsSL https://claude.ai/install.sh | bash'
            - su - claude -c 'mkdir -p /home/claude/.claude && echo "{\"outputStyle\":\"Explanatory\"}" > /home/claude/.claude/settings.json'
      - name: secrets
        secret:
          secretName: claude-box-secrets
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-box-vm-0-workspace
  namespace: claude-box-vm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
